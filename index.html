<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buena Práctica - Gestión DNI</title>

<style>

body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f9f9f9;
    text-align:center;
}

.logo{
    display:block;
    margin:0 auto 15px auto;
    max-width:120px;
}

h2{
    margin-top:0;
}

input,
button{
    padding:10px;
    margin:5px;
}

button{
    cursor:pointer;
}

table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
    background:white;
}

th,
td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#2196F3;
    color:white;
}

tr:nth-child(even){
    background:#f2f2f2;
}

.totales{
    background:#e0e0e0;
    font-weight:bold;
}

</style>

</head>

<body>

<img src="insignia.png"
     alt="Insignia del colegio"
     class="logo">

<h2>
Consulta con DNI - Progreso de Competencias - Primer Bimestre 2026
</h2>

<input
    type="text"
    id="dni"
    placeholder="Ingrese DNI"
>

<button onclick="buscar()">
Buscar
</button>

<div id="resultado"></div>

<script>

const URL_SCRIPT =
"https://script.google.com/macros/s/AKfycbz1YDsQxc8qtBxnaJVpblWaoXBrKISGnqGslCPQH-krIOSSIte7923v0FOBh31P2NY/exec";

function buscar(){

    const dni =
        document.getElementById("dni")
        .value
        .trim();

    const resultado =
        document.getElementById("resultado");

    if(dni===""){
        resultado.innerHTML =
        "⚠️ Ingrese un número de DNI.";
        return;
    }

    resultado.innerHTML =
    "Consultando información...";

    fetch(
        URL_SCRIPT +
        "?dni=" +
        encodeURIComponent(dni)
    )

    .then(response => response.json())

    .then(alumno => {

        if(alumno.error){

            resultado.innerHTML =
            "❌ DNI no encontrado";

            return;
        }

        let html =
        `<h3>${alumno["ESTUDIANTE"] || ""}</h3>`;

        html += `
        <table>
            <tr>
                <th>Área Curricular</th>
                <th>C1</th>
                <th>C2</th>
                <th>C3</th>
                <th>C4</th>
            </tr>
        `;

        let areas = {};

        Object.keys(alumno).forEach(col => {

            if(
                col.includes("C1") ||
                col.includes("C2") ||
                col.includes("C3") ||
                col.includes("C4")
            ){

                let partes =
                    col.split(" ");

                let area =
                    partes.slice(0,-1).join(" ");

                let competencia =
                    partes[partes.length - 1];

                if(!areas[area]){
                    areas[area] = {};
                }

                areas[area][competencia] =
                    alumno[col];
            }

        });

        Object.keys(areas).forEach(area => {

            html += `
            <tr>
                <td>${area}</td>
                <td>${areas[area]["C1"] || ""}</td>
                <td>${areas[area]["C2"] || ""}</td>
                <td>${areas[area]["C3"] || ""}</td>
                <td>${areas[area]["C4"] || ""}</td>
            </tr>
            `;

        });

        [
            "Total de Calificaciones",
            "Total AD",
            "Total A",
            "Total B",
            "Total C"
        ]

        .forEach(col => {

            if(
                alumno[col] !== undefined &&
                alumno[col] !== ""
            ){

                html += `
                <tr class="totales">
                    <td colspan="4">${col}</td>
                    <td>${alumno[col]}</td>
                </tr>
                `;
            }

        });

        html += "</table>";

        resultado.innerHTML = html;

    })

    .catch(error => {

        console.error(error);

        resultado.innerHTML =
        "❌ Error al consultar los datos.";

    });

}

</script>

</body>
</html>
